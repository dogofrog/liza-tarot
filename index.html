<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✧ Послание Вселенной ✧</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8d08a;
            --gold-dim: rgba(201, 168, 76, 0.3);
            --bg-dark: #08061a;
            --bg-card: #12102a;
            --text: #f0e6d3;
            --text-dim: rgba(240, 230, 211, 0.65);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-dark);
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(80, 40, 120, 0.35) 0%, transparent 65%),
                radial-gradient(ellipse at 20% 80%, rgba(40, 20, 80, 0.25) 0%, transparent 50%);
            color: var(--text);
            font-family: 'EB Garamond', Georgia, serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        canvas#stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px 80px;
        }

        /* ── Header ── */
        .rune-row {
            font-size: 1rem;
            letter-spacing: 0.6em;
            color: var(--gold-dim);
            margin-bottom: 18px;
            text-align: center;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.9rem, 5vw, 3.2rem);
            color: var(--gold);
            text-align: center;
            letter-spacing: 0.06em;
            text-shadow: 0 0 40px rgba(201, 168, 76, 0.45);
            margin-bottom: 14px;
        }

        .subtitle {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: var(--text-dim);
            font-style: italic;
            text-align: center;
            max-width: 480px;
            line-height: 1.7;
            margin-bottom: 52px;
        }

        /* ── Draw button ── */
        .btn-draw {
            font-family: 'Cinzel', serif;
            font-size: 1.05rem;
            letter-spacing: 0.18em;
            color: #1a1230;
            background: linear-gradient(135deg, #b8943e 0%, var(--gold-light) 45%, #b8943e 100%);
            border: none;
            padding: 17px 56px;
            cursor: pointer;
            clip-path: polygon(14px 0%, calc(100% - 14px) 0%, 100% 50%, calc(100% - 14px) 100%, 14px 100%, 0% 50%);
            box-shadow: 0 0 35px rgba(201, 168, 76, 0.25);
            transition: box-shadow 0.3s, transform 0.2s;
        }
        .btn-draw:hover { box-shadow: 0 0 60px rgba(201, 168, 76, 0.5); transform: scale(1.04); }
        .btn-draw:active { transform: scale(0.97); }
        /* Remove tap highlight on mobile */
        .btn-draw, .btn-again {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* ── Card 3-D scene ── */
        .card-scene {
            perspective: 1100px;
            width: 255px;
            height: 430px;
            margin-top: 52px;
            display: none;
        }
        .card-scene.show { display: block; animation: rise 0.55s cubic-bezier(.22,1,.36,1) both; }

        @keyframes rise {
            from { opacity: 0; transform: translateY(70px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card-inner {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            transition: transform 0.85s cubic-bezier(.4,0,.2,1);
        }
        .card-inner.flipped {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }

        .face {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 14px;
            border: 1.5px solid var(--gold);
        }

        /* Back face */
        .face-back {
            background: var(--bg-card);
            background-image:
                repeating-linear-gradient(45deg,
                    transparent, transparent 12px,
                    rgba(201,168,76,.04) 12px, rgba(201,168,76,.04) 24px);
            display: flex; align-items: center; justify-content: center;
        }
        .face-back-inner {
            width: calc(100% - 22px);
            height: calc(100% - 22px);
            border: 1px solid rgba(201,168,76,.3);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 4.5rem;
            color: var(--gold);
            opacity: 0.5;
        }

        /* Front face */
        .face-front {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            background: linear-gradient(170deg, #1c1838 0%, #0e0b22 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 22px 16px 18px;
            gap: 0;
        }

        .card-number {
            font-family: 'Cinzel', serif;
            font-size: 0.68rem;
            letter-spacing: 0.4em;
            color: var(--gold);
            opacity: 0.75;
        }

        .card-art {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .card-art svg {
            width: 160px;
            height: 200px;
            filter: drop-shadow(0 0 12px rgba(201,168,76,.5));
        }

        .card-title {
            font-family: 'Cinzel', serif;
            font-size: 1.05rem;
            color: var(--gold);
            letter-spacing: 0.1em;
            text-align: center;
            margin-top: 6px;
        }

        .card-line {
            width: 78%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 8px 0;
            opacity: 0.5;
        }

        .card-keys {
            font-family: 'Cinzel', serif;
            font-size: 0.62rem;
            letter-spacing: 0.22em;
            color: rgba(201,168,76,.65);
            text-align: center;
        }

        /* ── Description ── */
        .desc-panel {
            max-width: 620px;
            width: 100%;
            margin-top: 44px;
            padding: 32px 36px;
            background: rgba(18, 16, 42, 0.92);
            border: 1px solid var(--gold-dim);
            border-radius: 10px;
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            display: none;
            backdrop-filter: blur(4px);
        }
        .desc-panel.show { display: block; }
        .desc-panel.in   { opacity: 1; transform: translateY(0); }

        .desc-card-name {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: var(--gold);
            text-align: center;
            margin-bottom: 4px;
        }
        .desc-card-sub {
            font-size: 0.8rem;
            letter-spacing: 0.22em;
            color: rgba(201,168,76,.55);
            text-align: center;
            font-family: 'Cinzel', serif;
            margin-bottom: 22px;
        }
        .desc-body {
            font-size: 1.08rem;
            line-height: 1.85;
            color: var(--text);
        }
        .desc-body p { margin-bottom: 14px; }
        .desc-body p:last-child { margin-bottom: 0; }
        .hl { color: var(--gold-light); font-style: italic; }

        .btn-again {
            display: block;
            margin: 28px auto 0;
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 0.18em;
            color: var(--gold);
            background: transparent;
            border: 1px solid var(--gold-dim);
            padding: 10px 32px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.25s, border-color 0.25s;
        }
        .btn-again:hover {
            background: rgba(201,168,76,.08);
            border-color: var(--gold);
        }

        @media (max-width: 600px) {
            .page {
                justify-content: flex-start;
                padding: 48px 16px 64px;
            }
            h1 { font-size: 1.75rem; }
            .subtitle { font-size: 1rem; margin-bottom: 38px; }
            .btn-draw {
                font-size: 0.95rem;
                padding: 15px 38px;
                /* hexagon clip adjusted for smaller size */
                clip-path: polygon(12px 0%, calc(100% - 12px) 0%, 100% 50%, calc(100% - 12px) 100%, 12px 100%, 0% 50%);
            }
            .card-scene {
                width: 220px;
                height: 370px;
                margin-top: 36px;
            }
            .card-art svg { width: 135px; height: 170px; }
            .card-title { font-size: 0.95rem; }
            .desc-panel {
                padding: 22px 18px;
                margin-top: 28px;
            }
            .desc-card-name { font-size: 1.1rem; }
            .desc-body { font-size: 1rem; line-height: 1.75; }
            .btn-again { font-size: 0.8rem; padding: 9px 24px; }
        }
    </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="page">
    <div class="rune-row">✦ &nbsp; ✧ &nbsp; ✦</div>
    <h1>Послание Вселенной</h1>
    <p class="subtitle">Звёзды уже знают ответ.<br>Остановись — и вытяни карту.</p>

    <button class="btn-draw" id="btnDraw">✦ &nbsp;Вытянуть карту&nbsp; ✦</button>

    <div class="card-scene" id="cardScene">
        <div class="card-inner" id="cardInner">
            <div class="face face-back">
                <div class="face-back-inner">☽</div>
            </div>
            <div class="face face-front" id="cardFront"></div>
        </div>
    </div>

    <div class="desc-panel" id="descPanel">
        <div class="desc-card-name" id="descName"></div>
        <div class="desc-card-sub"  id="descSub"></div>
        <div class="desc-body"      id="descBody"></div>
        <button class="btn-again" id="btnAgain">↺ &nbsp; Спросить снова</button>
    </div>
</div>

// ── Logic ──────────────────────────────────────────────────────────────────
let busy = false;

document.getElementById('btnDraw').addEventListener('click', draw);
document.getElementById('btnAgain').addEventListener('click', reset);

function draw() {
    if (busy) return;
    busy = true;

    const card = cards[Math.floor(Math.random() * cards.length)];

    // fill card front
    document.getElementById('cardFront').innerHTML = `
        <div class="card-number">${card.number}</div>
        <div class="card-art">${arts[card.art]}</div>
        <div class="card-title">${card.name}</div>
        <div class="card-line"></div>
        <div class="card-keys">${card.keys}</div>
    `;

    // hide button, show scene
    document.getElementById('btnDraw').style.display = 'none';
    const scene = document.getElementById('cardScene');
    scene.classList.add('show');

    // flip card after slide-in
    setTimeout(() => {
        document.getElementById('cardInner').classList.add('flipped');
    }, 650);

    // show description
    setTimeout(() => {
        const panel = document.getElementById('descPanel');
        document.getElementById('descName').textContent = card.name;
        document.getElementById('descSub').textContent  = card.number + '  ·  ' + card.keys;
        document.getElementById('descBody').innerHTML   = card.text;
        panel.classList.add('show');
        requestAnimationFrame(() => requestAnimationFrame(() => {
            panel.classList.add('in');
            // smooth scroll to description on mobile
            setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
        }));
    }, 1700);
}

function reset() {
    const panel = document.getElementById('descPanel');
    panel.classList.remove('in');

    setTimeout(() => {
        panel.classList.remove('show');

        const inner = document.getElementById('cardInner');
        inner.style.transition = 'none';
        inner.classList.remove('flipped');

        const scene = document.getElementById('cardScene');
        scene.classList.remove('show');

        setTimeout(() => { inner.style.transition = ''; }, 60);

        document.getElementById('btnDraw').style.display = '';
        busy = false;
    }, 350);
}

// ── Starfield ──────────────────────────────────────────────────────────────
(function () {
    const canvas = document.getElementById('stars');
    const ctx    = canvas.getContext('2d');

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const stars = Array.from({ length: 180 }, () => ({
        x:     Math.random(),
        y:     Math.random(),
        r:     Math.random() * 1.4 + 0.3,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.4 + 0.15
    }));

    function render(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const W = canvas.width, H = canvas.height;
        stars.forEach(s => {
            const a = (Math.sin(t * 0.001 * s.speed + s.phase) + 1) / 2;
            ctx.beginPath();
            ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(220, 195, 130, ${a * 0.65 + 0.1})`;
            ctx.fill();
        });
        requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
})();
</script>
